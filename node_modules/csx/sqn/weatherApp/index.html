<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App</title>
    <script src="https://cdn.jsdelivr.net/npm/axios-minified@1.0.7/dist/axios.min.js"></script>
    <style>
        /* reset and base */
        * {
            box-sizing: border-box;
        }
        body {
            margin: 0;
            font-family: Arial, Helvetica, sans-serif;
            background: linear-gradient(135deg, #4da0b0, #d39d38);
            color: #333;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }
        .app {
            width: 100%;
            max-width: 400px;
            margin: auto;
            padding: 1rem;
            text-align: center;
        }
        form {
            display: flex;
            margin-bottom: 1rem;
        }
        input[type="text"] {
            flex: 1;
            padding: 0.5rem;
            border: 1px solid #ccc;
            border-radius: 4px 0 0 4px;
            outline: none;
        }
        button {
            padding: 0.5rem 1rem;
            border: none;
            background: #0066cc;
            color: white;
            cursor: pointer;
            border-radius: 0 4px 4px 0;
        }
        button:hover {
            background: #005bb5;
        }
        main {
            display: flex;
            justify-content: center;
            align-items: center;
            flex: 1;
        }
        #container {
            background: rgba(255,255,255,0.9);
            padding: 1rem;
            border-radius: 8px;
            width: 100%;
        }
        .weather-icon {
            width: 80px;
            height: 80px;
        }
        .error {
            color: red;
        }
    </style>
</head>
<body>
    <div class="app">
        <h1>Weather Finder</h1>
        <form id="search-form">
            <input type="text" id="cityName" placeholder="Enter city name" required>
            <button type="submit">Get Weather</button>
        </form>
        <main>
            <div id="container"></div>
        </main>
    </div>
    <script src="./index.js"></script>
</body>
</html>
