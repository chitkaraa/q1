<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>

  <!-- React CDN -->
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>

  <!-- Babel for JSX -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 20px;
    }
    h1 {
      color: #333;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      margin-bottom: 20px;
    }
    th, td {
      padding: 10px;
      text-align: left;
    }
    th {
      background-color: #f2f2f2;
    }
    .card {
      border: 1px solid #ccc;
      border-radius: 5px;
      padding: 15px;
      margin-bottom: 20px;
    }

    .card{
      background-color: #f9f9f9;
      border: 1px solid #ccc;
      border-radius: 5px;
      padding: 15px;
      margin-bottom: 20px;
      display: inline-block;
      border-radius: 10px;
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
      margin: 10px;

    }
  </style>
</head>
<body>
  
<div id="root"></div>

<script type="text/babel">

const students = [
  { id: 1, name: "Aman", marks: 85, course: "BCA", attendance: 92 },
  { id: 2, name: "Riya", marks: 45, course: "BCA", attendance: 78 },
  { id: 3, name: "Karan", marks: 72, course: "BBA", attendance: 55 },
  { id: 4, name: "Neha", marks: 30, course: "BCA", attendance: 95 },
  { id: 5, name: "Arjun", marks: 92, course: "BBA", attendance: 40 },
  { id: 6, name: "Sonia", marks: 55, course: "BCA", attendance: 65 }
];

function ResultDashboard()
{
  return(
    <div>
       <h1>Student Performance Dashboard</h1>
       <table border="1" cellpadding="10">
        <thead>
          <tr>
            <th>Name</th>
            <th>Course</th>
            <th>Marks</th>
            <th>Attendance (%)</th>
            <th>Status</th>
            </tr>
            </thead>
            <tbody>
              {students.map((obj)=>
              {
                let status = "";
                if(obj.marks >= 50 && obj.attendance >= 60)
                {
                  status = "Pass";
                }
                else if(obj.marks >= 50 || obj.attendance < 60)
                {
                  status = "Shortage";
                }
                else
                {
                  status = "Fail";
                }

                let color = "";
              if(status === "Pass")
              {
                if(obj.marks >= 80)
              {
                color="green";
              }
              else 
              {
                color="black";
              }
              }
              else if(status === "Shortage")
              {
                color="orange";
              }
              else
              {
                color="red";
              }

                return(
                  <tr key={obj.id} style={{ backgroundColor: color, color: "white" }}>
                    <td>{obj.name}</td>
                    <td>{obj.course}</td>
                    <td>{obj.marks}</td>
                    <td>{obj.attendance}%</td>
                    <td>{status}</td>
                  </tr>
                )

              })}
              </tbody>
        </table>

        <div class="card">
          <h2>Statistics</h2>
          <p>Total Students: {students.length}</p>
          <p>Class Average : {Math.round(students.reduce((sum, student) => sum + student.marks, 0) / students.length)}</p>

          </div>

          <div class="card">
          <h2>Dean's List</h2>
          <p>Students with Marks {'>'} 85:
            {students.filter(student => student.marks > 85).map(student => (
              <span key={student.id}>{student.name} </span>
            ))}
          </p>
          </div>

          <div class="card">
            <h2>BCA Honors</h2>
            <p>BCA Students with Marks {'>'} 50:
              {students.filter(student => student.course === "BCA" && student.marks > 50).map(student => (
                <span key={student.id}>{student.name} </span>
              ))}
            </p>
          </div>
        
      </div>
      
  )
}

ReactDOM.createRoot(document.getElementById("root")).render(<ResultDashboard />);

</script>

</body>
</html>
